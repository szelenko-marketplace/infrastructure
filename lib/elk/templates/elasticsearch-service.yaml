apiVersion: v1
kind: Service
metadata:
  name: "{{ include "elk.fullname" . }}"
  labels:
    {{- include "elk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.elasticsearch.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "elk.selectorLabels" . | nindent 4 }}