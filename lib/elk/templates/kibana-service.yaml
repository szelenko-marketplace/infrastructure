apiVersion: v1
kind: Service
metadata:
  name: "{{ include "elk.fullname" . }}-kibana"
  labels:
    {{- include "elk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kibana.httpPort }}
      targetPort: 5601
      protocol: TCP
      name: http
  selector:
    {{- include "elk.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kibana