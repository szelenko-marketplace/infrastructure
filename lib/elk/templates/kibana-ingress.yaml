{{- if .Values.kibana.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ include "elk.fullname" . }}-kibana"
  labels:
    {{- include "elk.labels" . | nindent 4 }}
  {{- with .Values.kibana.ingress.annotations }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # Оці дві анотації часто вирішують помилки 500 на великих JS файлах:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.kibana.ingress.className }}
  rules:
    {{- range .Values.kibana.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: "{{ include "elk.fullname" $ }}-kibana"
                port:
                  number: {{ $.Values.kibana.httpPort }}
          {{- end }}
    {{- end }}
{{- end }}