apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "elk.fullname" . }}-kibana"
  labels:
    {{- include "elk.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "elk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: kibana
  template:
    metadata:
      labels:
        {{- include "elk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: kibana
    spec:
      # 1. Додаємо init-контейнер для перевірки доступності
      initContainers:
        - name: wait-for-elasticsearch
          image: busybox:1.28
          command:
            - "sh"
            - "-c"
            - >
              until nc -z {{ include "elk.fullname" . }} 9200; do
                echo "Waiting for Elasticsearch ({{ include "elk.fullname" . }})...";
                sleep 5;
              done;
              echo "Elasticsearch is up!";

      containers:
        - name: kibana
          image: "{{ .Values.kibana.image.repository }}:{{ .Values.kibana.image.tag }}"
          ports:
            - containerPort: {{ .Values.kibana.httpPort }}
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://{{ include "elk.fullname" . }}:9200"
            {{- if .Values.kibana.env }}
            {{- toYaml .Values.kibana.env | nindent 12 }}
            {{- end }}
          # 2. Додаємо Readiness Probe (щоб трафік на Kibana йшов тільки коли вона готова)
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3