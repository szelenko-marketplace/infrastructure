apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4.2-management-alpine
          ports:
            - name: amqp
              containerPort: 5672
            - name: stats
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: {{.Values.auth.username}}
            - name: RABBITMQ_DEFAULT_PASS
              value: {{.Values.auth.password}}
            - name: RABBITMQ_ENABLED_PLUGINS_FILE
              value: "/var/lib/rabbitmq/enabled_plugins"
            - name: RABBITMQ_ENABLED_PLUGINS
              value: "rabbitmq_management,rabbitmq_shovel,rabbitmq_shovel_management"